services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [shopflow]

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [app]
    networks: [shopflow]

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_DATABASE:-shopflow}
      POSTGRES_USER: ${DB_USERNAME:-shopflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-shopflow}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [shopflow]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks: [shopflow]

volumes:
  pgdata:

networks:
  shopflow:
